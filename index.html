    /* Dasar Body */
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #ffffff;
      color: #333;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Background Samar (Watermark) */
    .bg-watermark {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-content: space-around;
      opacity: 0.05;
      pointer-events: none;
    }

    .bg-icon { font-size: 80px; margin: 40px; filter: grayscale(100%); }

    .header {
      text-align: center;
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 4px solid #003791;
      backdrop-filter: blur(5px);
    }

    .header h1 {
      margin: 0;
      color: #003791;
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      background: rgba(248, 249, 250, 0.9);
      padding: 25px;
      border-radius: 20px;
      width: 100%;
      max-width: 550px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border: 1px solid #ddd;
      backdrop-filter: blur(10px);
    }

    .search-box {
      position: relative;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #ddd;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      background: #003791;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      font-size: 1rem;
      transition: 0.2s;
    }

    button:hover { background: #0072ce; }

    .result-box {
      margin-top: 25px;
      display: none;
      border-top: 2px solid #eee;
      padding-top: 20px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .status-item {
      background: white;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #eee;
      text-align: center;
    }

    .badge {
      display: block;
      margin-top: 5px;
      padding: 4px;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.75rem;
    }

    .supported { background: #d4edda; color: #155724; }
    .not-supported { background: #f8d7da; color: #721c24; }

    .footer {
      text-align: center;
      padding: 30px;
      color: #999;
      font-size: 0.9rem;
    }
  </style>
</head>

    function checkGame() {
      const input = document.getElementById('gameInput').value.toLowerCase().trim();
      const resultDiv = document.getElementById('result');
      const resTitle = document.getElementById('resTitle');
      const resList = document.getElementById('resList');

      if (!input) { alert("Masukkan nama game!"); return; }

      const game = gameDb.find(g => g.n.toLowerCase().includes(input));

      if (game) {
        resultDiv.style.display = "block";
        resTitle.innerText = game.n;
        
        const badge = (s) => `<span class="badge ${s ? 'supported' : 'not-supported'}">${s ? '✔ YES' : '✘ NO'}</span>`;

        resList.innerHTML = `
          <div class="status-item">PS5 ${badge(game.ps5)}</div>
          <div class="status-item">PS4 ${badge(game.ps4)}</div>
          <div class="status-item">PS3 ${badge(game.ps3)}</div>
          <div class="status-item">VR ${badge(game.vr)}</div>
          <div class="status-item">Nintendo ${badge(game.nin)}</div>
        `;
      } else {
        alert("Game '" + input + "' tidak ada di 100 list kami. Coba game lain!");
        resultDiv.style.display = "none";
      }
