<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#001a4d" />
  <title>Gamefinder - 100+ Games Database</title>
  
  <style>
    /* --- Gaya Dasar Body (PS5 Dark Mode) --- */
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #000c24; 
      color: #ffffff;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* --- Background Watermark --- */
    .bg-watermark {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-content: space-around;
      opacity: 0.03; 
      pointer-events: none;
    }

    .bg-icon { font-size: 80px; margin: 40px; filter: invert(100%); }

    /* --- Header Gamefinder --- */
    .header {
      text-align: center;
      padding: 40px 20px;
      background: rgba(0, 12, 36, 0.9);
      border-bottom: 4px solid #00aaff;
      backdrop-filter: blur(5px);
    }

    .header h1 {
      margin: 0;
      color: #00aaff;
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 15px rgba(0, 170, 255, 0.5);
    }
    
    .header p {
        color: #b0c4de;
        margin-top: 10px;
    }

    .main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- Kotak Pencarian --- */
    .card {
      background: rgba(30, 40, 60, 0.9);
      padding: 25px;
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 1px solid #2a3b5a;
      backdrop-filter: blur(10px);
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #2a3b5a;
      background-color: #000c24;
      color: #ffffff;
      font-size: 1rem;
      box-sizing: border-box;
      transition: 0.3s;
    }
    
    input:focus {
        outline: none;
        border-color: #00aaff;
    }

    button {
      background: #0044cc;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      font-size: 1rem;
      margin-top: 15px;
      transition: 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover { 
        background: #00aaff;
        box-shadow: 0 0 15px rgba(0, 170, 255, 0.5);
    }

    /* --- List Hasil Pencarian --- */
    .game-result-item {
      background: #1a253a;
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #2a3b5a;
      margin-top: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    .status-item {
      background: #000c24;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #2a3b5a;
      text-align: center;
      font-size: 0.85rem;
      color: #b0c4de;
    }

    .badge {
      display: block;
      margin-top: 5px;
      padding: 4px;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.75rem;
    }

    .supported { background: #004d1a; color: #80ffaa; border: 1px solid #00cc44; }
    .not-supported { background: #4d0000; color: #ff8080; border: 1px solid #cc0000; }

    .footer {
      text-align: center;
      padding: 30px;
      color: #667788;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="bg-watermark">
    <div class="bg-icon">🎮</div><div class="bg-icon">🕶️</div>
    <div class="bg-icon">🕹️</div><div class="bg-icon">📺</div>
  </div>

  <header class="header">
    <h1>GAMEFINDER</h1>
    <p>Database 100+ Games & Compatibility</p>
  </header>

  <main class="main">
    <section class="card">
      <div class="search-box">
        <input type="text" id="gameInput" placeholder="Cari Game (Contoh: Resident Evil, GTA, Dynasty...)" onkeyup="if(event.keyCode===13) checkGame()">
      </div>
      <button onclick="checkGame()">CEK KOMPATIBILITAS</button>
      <div id="resultArea"></div>
    </section>
  </main>

  <footer class="footer">
    <p>© 2025 Anwar Fauzi - Gamefinder</p>
  </footer>

  <script>
    // Database (sudah mencakup RE, GTA, dan Dynasty Warriors)
    const gameDb = [
        { n: "Resident Evil 4 Remake", ps3: false, ps4: true, ps5: true, vr: true, nin: false },
        { n: "Resident Evil 3 Remake", ps3: false, ps4: true, ps5: true, vr: false, nin: false },
        { n: "Resident Evil 2 Remake", ps3: false, ps4: true, ps5: true, vr: false, nin: false },
        { n: "Resident Evil Village", ps3: false, ps4: true, ps5: true, vr: true, nin: true },
        { n: "Resident Evil 7", ps3: false, ps4: true, ps5: true, vr: true, nin: true },
        { n: "Resident Evil HD Remaster", ps3: true, ps4: true, ps5: true, vr: false, nin: true },
        { n: "Resident Evil 5", ps3: true, ps4: true, ps5: true, vr: false, nin: true },
        { n: "Resident Evil 6", ps3: true, ps4: true, ps5: true, vr: false, nin: true },
        { n: "GTA VI", ps3: false, ps4: false, ps5: true, vr: false, nin: false },
        { n: "GTA V", ps3: true, ps4: true, ps5: true, vr: false, nin: false },
        { n: "GTA IV", ps3: true, ps4: false, ps5: false, vr: false, nin: false },
        { n: "GTA San Andreas - Definitive", ps3: false, ps4: true, ps5: true, vr: false, nin: true },
        { n: "Dynasty Warriors Origins", ps3: false, ps4: false, ps5: true, vr: false, nin: false },
        { n: "Dynasty Warriors 9 Empires", ps3: false, ps4: true, ps5: true, vr: false, nin: true },
        { n: "Dynasty Warriors 8 With XL", ps3: true, ps4: true, ps5: true, vr: false, nin: true },
        { n: "God of War Ragnarok", ps3: false, ps4: true, ps5: true, vr: false, nin: false },
        { n: "Elden Ring", ps3: false, ps4: true, ps5: true, vr: false, nin: false },
        { n: "Minecraft", ps3: true, ps4: true, ps5: true, vr: true, nin: true }
    ];

    function checkGame() {
      const input = document.getElementById('gameInput').value.toLowerCase().trim();
      const resultArea = document.getElementById('resultArea');
      resultArea.innerHTML = "";

      if (!input) { alert("Masukkan nama game!"); return; }

      const matches = gameDb.filter(g => g.n.toLowerCase().includes(input));

      if (matches.length > 0) {
        matches.forEach(game => {
          const badge = (s) => `<span class="badge ${s ? 'supported' : 'not-supported'}">${s ? '✔ YES' : '✘ NO'}</span>`;
          resultArea.innerHTML += `
            <div class="game-result-item">
              <h2 style="color:#00aaff; text-align:center; margin-top:0;">${game.n}</h2>
              <div class="status-grid">
                <div class="status-item">PS5 ${badge(game.ps5)}</div>
                <div class="status-item">PS4 ${badge(game.ps4)}</div>
                <div class="status-item">PS3 ${badge(game.ps3)}</div>
                <div class="status-item">VR ${badge(game.vr)}</div>
                <div class="status-item">Nintendo ${badge(game.nin)}</div>
              </div>
            </div>`;
        });
      } else {
        alert("Game tidak ditemukan!");
      }
    }
  </script>
</body>
</html>
